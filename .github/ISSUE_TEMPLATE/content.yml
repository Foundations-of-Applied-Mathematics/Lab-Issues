name: Lab Content
description: Incorrect code, confusing instructions, logical/math errors, misleading explanations.
labels: ["Lab Content"]
body:
  - type: textarea
    id: details
    attributes:
      label: 'Description:'
      description: >-
        Provide more details about the issue. Please provide reasoning or sources.
    validations:
      required: true
  - type: textarea
    id: correct
    attributes:
      label: 'Suggested Fix:'
      description: If you know the correction for this issue, please describe it below.
  - type: input
    id: labname
    attributes:
      label: Volume & Lab (By Name)
      description: Please do not refer to labs by number
    validations:
      required: true
  - type: textarea
    id: lines
    attributes:
      label: Source Lines
      description: Relevant areas in the lab source code. Not required.
      placeholder: >-
        (Please use the issues button on the labs site to auto-fill this field,
        if there are segments of related code on the lab site.)
      render: text
